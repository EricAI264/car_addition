<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Let's Race!</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Modern UI Foundations - Dynamic Viewport Height for iOS */
        :root {
            --ios-safe-top: env(safe-area-inset-top, 0px);
            --ios-safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f0f9ff;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Smooth Physics-based Transitions */
        .car-transition {
            transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Animations */
        @keyframes smoke-rise {
            0% { transform: translateY(0) scale(0.5); opacity: 0.8; }
            100% { transform: translateY(-50px) scale(2); opacity: 0; }
        }
        .smoke { animation: smoke-rise 1s ease-out infinite; }

        @keyframes pop-in {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes star-fly {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tw-tx), var(--tw-ty)) scale(1.5) rotate(var(--tw-tr)); opacity: 0; }
        }
        .star-burst { animation: star-fly 1.2s ease-out forwards; }
    </style>
</head>
<body class="touch-none select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useMemo } = React;

        // --- Design Tokens & Icons ---
        const TrophyIcon = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-white w-5 h-5 md:w-6 md:h-6"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );
        const RefreshIcon = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-slate-500 w-5 h-5 md:w-6 md:h-6"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        );
        const GasIcon = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8 md:w-10 md:h-10"><path d="m9 18 6-6-6-6"/></svg>
        );
        const CheckIcon = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-10 h-10 md:w-12 md:h-12"><path d="M20 6 9 17l-5-5"/></svg>
        );
        const StarIcon = ({ size = 24, color = "#facc15" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        );

        // --- Victory Burst ---
        const VictoryStars = () => {
            const stars = useMemo(() => {
                const colors = ['#facc15', '#f87171', '#60a5fa', '#4ade80', '#c084fc', '#fb923c'];
                return Array.from({ length: 35 }).map((_, i) => ({
                    id: i,
                    color: colors[i % colors.length],
                    tx: (Math.random() - 0.5) * 600 + 'px',
                    ty: (Math.random() - 0.8) * 500 + 'px',
                    tr: Math.random() * 720 + 'deg',
                    delay: Math.random() * 0.4 + 's',
                    size: Math.random() * 20 + 15
                }));
            }, []);

            return (
                <div className="fixed inset-0 pointer-events-none flex items-center justify-center z-50">
                    {stars.map(s => (
                        <div key={s.id} className="absolute star-burst" style={{'--tw-tx': s.tx, '--tw-ty': s.ty, '--tw-tr': s.tr, animationDelay: s.delay, color: s.color}}>
                            <StarIcon size={s.size} color="currentColor" />
                        </div>
                    ))}
                </div>
            );
        };

        const Wheel = ({ x, y, r = 10, rotation }) => (
            <g transform={`rotate(${rotation} ${x} ${y})`}>
                <circle cx={x} cy={y} r={r} fill="#1a1a1a" stroke="#fff" strokeWidth="2" />
                <path d={`M${x} ${y-r} L${x} ${y+r} M${x-r} ${y} L${x+r} ${y}`} stroke="#333" strokeWidth="2" />
            </g>
        );

        const CarDesigns = {
            SPOILER: {
                id: 'SPOILER', name: 'Type R Racer',
                component: ({ wheelRotation, isBroken }) => (
                    <svg viewBox="0 0 120 60" className={`w-24 sm:w-28 md:w-32 transition-transform ${isBroken ? 'animate-bounce' : ''}`}>
                        <path d="M5 15 L25 15 L22 0 L8 0 Z" fill="#111" transform="translate(5, 5)" />
                        <rect x="12" y="5" width="2" height="10" fill="#333" />
                        <path d="M5 45 L115 45 L110 32 L85 22 L60 18 L25 18 L5 25 Z" fill="#ef4444" />
                        <path d="M30 22 L60 22 L80 25 L80 32 L15 32 Z" fill="#1e293b" />
                        <circle cx="105" cy="35" r="4" fill="#fef08a" />
                        <Wheel x={25} y={45} rotation={wheelRotation} />
                        <Wheel x={95} y={45} rotation={wheelRotation} />
                    </svg>
                )
            },
            BULLET: {
                id: 'BULLET', name: 'Blue Bullet',
                component: ({ wheelRotation, isBroken }) => (
                    <svg viewBox="0 0 120 60" className={`w-24 sm:w-28 md:w-32 transition-transform ${isBroken ? 'animate-bounce' : ''}`}>
                        <path d="M5 45 Q 5 15, 60 15 L110 22 Q 120 25, 120 45 Z" fill="#3b82f6" />
                        <path d="M10 15 L40 15 L35 5 L15 5 Z" fill="#1e40af" />
                        <path d="M65 20 L95 20 L90 28 L65 28 Z" fill="#1e293b" />
                        <Wheel x={30} y={45} rotation={wheelRotation} />
                        <Wheel x={90} y={45} rotation={wheelRotation} />
                    </svg>
                )
            },
            MONSTER: {
                id: 'MONSTER', name: 'Speedy Bus',
                component: ({ wheelRotation, isBroken }) => (
                    <svg viewBox="0 0 120 80" className={`w-24 sm:w-28 md:w-32 transition-transform ${isBroken ? 'animate-bounce' : ''}`}>
                        <rect x="10" y="5" width="100" height="50" rx="4" fill="#22c55e" />
                        {[15, 35, 55].map(x => <rect key={x} x={x} y="10" width="15" height="12" rx="2" fill="#1e293b" />)}
                        <rect x="75" y="10" width="20" height="12" rx="2" fill="#1e293b" />
                        {[15, 35, 55].map(x => <rect key={`b${x}`} x={x} y="30" width="15" height="12" rx="2" fill="#1e293b" />)}
                        <rect x="75" y="30" width="25" height="18" rx="2" fill="#1e293b" />
                        <path d="M10 5 L35 5 L30 -5 L5 -5 Z" fill="#166534" />
                        <Wheel x={30} y={55} r={10} rotation={wheelRotation} />
                        <Wheel x={90} y={55} r={10} rotation={wheelRotation} />
                    </svg>
                )
            }
        };

        const App = () => {
            const [view, setView] = useState('SELECT');
            const [selectedCar, setSelectedCar] = useState('SPOILER');
            const [gameState, setGameState] = useState('IDLE');
            const [problem, setProblem] = useState({ a: 3, b: 2 });
            const [currentPos, setCurrentPos] = useState(3);
            const [score, setScore] = useState(0);
            const [wheelRotation, setWheelRotation] = useState(0);

            const speak = (t) => { if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.rate = 1; window.speechSynthesis.speak(m); } };

            const generate = useCallback(() => {
                const a = Math.floor(Math.random() * 5) + 1;
                const b = Math.floor(Math.random() * 4) + 1;
                setProblem({ a, b });
                setCurrentPos(a);
                setGameState('IDLE');
                speak(`Start at ${a}. Add ${b}. Go!`);
            }, []);

            const gas = () => {
                if (gameState === 'SUCCESS' || currentPos >= 10) return;
                setGameState('IDLE');
                setCurrentPos(p => p + 1);
                setWheelRotation(r => r + 120);
                speak(`${currentPos + 1}`);
            };

            const submit = () => {
                const ans = problem.a + problem.b;
                if (currentPos === ans) {
                    setGameState('SUCCESS');
                    setScore(s => s + 1);
                    speak(`Great Job! ${problem.a} plus ${problem.b} is ${ans}!`);
                } else {
                    setGameState('ERROR');
                    setCurrentPos(problem.a); // Reset car to the starting position
                    speak(`Try Again! Back to the start at ${problem.a}!`);
                }
            };

            if (view === 'SELECT') {
                return (
                    <div className="min-h-[100dvh] bg-slate-900 flex flex-col items-center justify-center p-4 text-white font-sans overflow-y-auto pt-12 pb-12">
                        <h1 className="text-3xl md:text-5xl font-black mb-8 md:mb-10 italic text-yellow-400 text-center uppercase tracking-tight shrink-0">Pick Your Ride</h1>
                        <div className="flex flex-col sm:flex-row gap-4 md:gap-6 w-full max-w-4xl justify-center shrink-0">
                            {Object.values(CarDesigns).map(car => (
                                <button key={car.id} onClick={() => { setSelectedCar(car.id); setView('PLAYING'); generate(); }} 
                                    className="bg-slate-800 border-4 border-slate-700 active:border-yellow-400 p-4 md:p-6 rounded-3xl transition-all transform active:scale-95 flex flex-col items-center w-full max-w-[260px] mx-auto">
                                    <div className="mb-2 md:mb-4 h-16 md:h-20 flex items-center justify-center"><car.component wheelRotation={0} isBroken={false} /></div>
                                    <span className="text-lg md:text-xl font-black italic uppercase text-slate-300">{car.name}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            const Vehicle = CarDesigns[selectedCar].component;

            return (
                <div className="h-[100dvh] flex flex-col bg-sky-100 p-2 md:p-4 overflow-hidden pt-[var(--ios-safe-top)] pb-[var(--ios-safe-bottom)]">
                    {gameState === 'SUCCESS' && <VictoryStars />}
                    
                    {/* Header */}
                    <header className="flex-none flex justify-between items-center bg-white/90 p-2 md:p-3 rounded-xl md:rounded-2xl shadow-sm border-b-2 border-slate-200 z-10">
                        <div className="flex items-center gap-2 bg-slate-50 px-2 md:px-3 py-1.5 rounded-xl border border-slate-100 w-24 md:w-32">
                            <div className="bg-yellow-400 p-1.5 rounded-lg"><TrophyIcon /></div>
                            <span className="text-xl md:text-2xl font-black text-slate-700">{score}</span>
                        </div>
                        <h1 className="text-2xl md:text-4xl font-black italic text-blue-600 uppercase tracking-tight">Let's Race!</h1>
                        <div className="w-24 md:w-32 flex justify-end">
                            <button onClick={() => setView('SELECT')} className="bg-slate-100 p-2 md:p-3 rounded-xl active:bg-slate-200 transition-colors">
                                <RefreshIcon />
                            </button>
                        </div>
                    </header>

                    {/* Main Arena: Flex-grow correctly distributes space */}
                    <main className="flex-grow flex flex-col justify-between items-center w-full max-w-xl mx-auto py-2 md:py-4 overflow-hidden">
                        
                        {/* 1. Equation */}
                        <div className="flex-none flex items-center justify-center gap-1.5 sm:gap-4 animate-pop mt-4">
                            <div className="bg-blue-500 px-4 py-3 md:px-5 md:py-4 rounded-2xl md:rounded-3xl shadow-[0_4px_0_#1e40af] md:shadow-[0_6px_0_#1e40af]">
                                <span className="text-5xl sm:text-7xl md:text-8xl font-black text-white leading-none">{problem.a}</span>
                            </div>
                            <span className="text-3xl md:text-4xl font-black text-slate-300">+</span>
                            <div className="bg-orange-500 px-4 py-3 md:px-5 md:py-4 rounded-2xl md:rounded-3xl shadow-[0_4px_0_#9a3412] md:shadow-[0_6px_0_#9a3412]">
                                <span className="text-5xl sm:text-7xl md:text-8xl font-black text-white leading-none">{problem.b}</span>
                            </div>
                            <span className="text-3xl md:text-4xl font-black text-slate-300">=</span>
                            <div className={`px-4 py-3 md:px-5 md:py-4 rounded-2xl md:rounded-3xl shadow-[0_4px_0_#15803d] md:shadow-[0_6px_0_#15803d] ${gameState === 'SUCCESS' ? 'bg-green-500' : 'bg-slate-100 shadow-[0_4px_0_#cbd5e1]'}`}>
                                <span className={`text-5xl sm:text-7xl md:text-8xl font-black leading-none ${gameState === 'SUCCESS' ? 'text-white' : 'text-slate-200'}`}>
                                    {gameState === 'SUCCESS' ? (problem.a + problem.b) : '?'}
                                </span>
                            </div>
                        </div>

                        {/* Spacer */}
                        <div className="flex-grow"></div>

                        {/* 2. Race Track Area */}
                        <div className="flex-none w-full px-2 sm:px-6 relative h-32 md:h-44 flex flex-col justify-end">
                            {/* Road */}
                            <div className="absolute inset-x-2 md:inset-x-6 bottom-1 h-16 md:h-20 bg-slate-800 rounded-full border-y-2 border-slate-700 flex items-center shadow-inner overflow-hidden">
                                <div className="w-full h-0.5 border-t-2 border-dashed border-white/20" />
                            </div>
                            {/* Numbers */}
                            <div className="absolute inset-x-2 md:inset-x-6 bottom-1 h-16 md:h-20 flex justify-between px-4 md:px-6 items-center">
                                {[...Array(11)].map((_, i) => (
                                    <div key={i} className="flex flex-col items-center">
                                        <div className={`w-0.5 md:w-1 h-3 md:h-4 mb-0.5 rounded-full ${i === currentPos ? 'bg-yellow-400 h-8 md:h-10 w-1.5 md:w-2' : 'bg-white/40'}`} />
                                        <span className={`text-sm md:text-xl font-black ${i === currentPos ? 'text-yellow-400 scale-125' : 'text-slate-400'}`}>{i}</span>
                                    </div>
                                ))}
                            </div>
                            {/* The Vehicle - Lifted up to bottom-20 (Mobile) / bottom-24 (Desktop) to clear the taller road */}
                            <div className="absolute bottom-20 md:bottom-24 car-transition z-20 flex flex-col items-center" style={{ left: `calc(${(currentPos / 10) * 100}% - 4px)`, width: '90px', transform: 'translateX(-50%)' }}>
                                {gameState === 'ERROR' && (
                                    <div className="absolute -top-10 left-4 pointer-events-none">
                                        <div className="smoke bg-slate-400 w-5 h-5 rounded-full absolute bottom-0 left-[-10px]" style={{animationDelay: '0s'}}></div>
                                        <div className="smoke bg-slate-500 w-6 h-6 rounded-full absolute bottom-2 left-[5px]" style={{animationDelay: '0.2s'}}></div>
                                        <div className="smoke bg-slate-600 w-7 h-7 rounded-full absolute bottom-5 left-[-15px]" style={{animationDelay: '0.4s'}}></div>
                                        <div className="smoke bg-slate-400 w-6 h-6 rounded-full absolute bottom-1 left-[15px]" style={{animationDelay: '0.1s'}}></div>
                                        <div className="smoke bg-slate-700 w-8 h-8 rounded-full absolute bottom-8 left-[-5px]" style={{animationDelay: '0.5s'}}></div>
                                        <div className="smoke bg-slate-500 w-9 h-9 rounded-full absolute bottom-10 left-[10px]" style={{animationDelay: '0.3s'}}></div>
                                    </div>
                                )}
                                <Vehicle wheelRotation={wheelRotation} isBroken={gameState === 'ERROR'} />
                                {gameState === 'ERROR' && <div className="mt-1 px-2 py-0.5 bg-red-500 text-white text-[10px] font-bold rounded-full uppercase animate-bounce shadow-md">Oops!</div>}
                            </div>
                        </div>

                        {/* Spacer */}
                        <div className="flex-grow"></div>

                        {/* 3. Controls */}
                        <div className="flex-none w-full flex justify-center gap-6 sm:gap-10 px-4 mb-4 md:mb-6">
                            {gameState === 'SUCCESS' ? (
                                <button onClick={generate} className="bg-blue-600 active:bg-blue-700 text-2xl md:text-3xl font-black text-white px-10 py-5 rounded-3xl shadow-[0_6px_0_#1e40af] active:translate-y-1 active:shadow-none animate-bounce">
                                    NEXT RACE
                                </button>
                            ) : (
                                <React.Fragment>
                                    <div className="flex flex-col items-center gap-1.5">
                                        <button onClick={gas} className="w-20 h-20 sm:w-24 sm:h-24 bg-red-500 rounded-full shadow-[0_6px_0_#991b1b] active:translate-y-1 active:shadow-none border-4 border-red-400 flex flex-col items-center justify-center text-white active:scale-95 transition-transform">
                                            <GasIcon />
                                            <span className="font-black text-sm sm:text-base italic leading-none">GAS</span>
                                        </button>
                                        <span className="text-[10px] sm:text-xs font-black text-slate-400 uppercase">Step</span>
                                    </div>
                                    <div className="flex flex-col items-center gap-1.5">
                                        <button onClick={submit} className="w-20 h-20 sm:w-24 sm:h-24 bg-green-500 rounded-full shadow-[0_6px_0_#166534] active:translate-y-1 active:shadow-none border-4 border-green-400 flex items-center justify-center text-white active:scale-95 transition-transform">
                                            <CheckIcon />
                                        </button>
                                        <span className="text-[10px] sm:text-xs font-black text-slate-400 uppercase tracking-widest">OK</span>
                                    </div>
                                </React.Fragment>
                            )}
                        </div>

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
